services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: todo-list_laravel-app
    restart: unless-stopped
    working_dir: /var/www
    volumes:
      - ./todo-app:/var/www
      - vendor_data:/var/www/vendor
    command: >
      sh -c "if [ ! -f .env ]; then cp .env.example .env; fi
      && composer install --no-interaction --prefer-dist
      && php artisan key:generate --force
      && chown -R www-data:www-data storage bootstrap/cache
      && chmod -R ug+rwX storage bootstrap/cache
      && php-fpm"
    depends_on:
      - db

  nginx:
    image: nginx:latest
    container_name: todo-list_nginx
    restart: unless-stopped
    ports:
      - "8000:80"
    volumes:
      - ./todo-app:/var/www
      - ./docker/nginx:/etc/nginx/conf.d
    depends_on:
      - app

  db:
    image: mysql:8.0
    container_name: todo-list_mysql-db
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: laravel
      MYSQL_ROOT_PASSWORD: root
      MYSQL_USER: laravel
      MYSQL_PASSWORD: secret
    ports:
      - "3306:3306"
    volumes:
      - db_data:/var/lib/mysql

volumes:
  db_data:
  vendor_data: